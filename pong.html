<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong - Online Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        #header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: rgba(0,0,0,0.3);
        }
        h1 {
            color: #fff;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            letter-spacing: 10px;
        }
        #game-container {
            position: relative;
            margin-top: 20px;
        }
        canvas {
            border: 3px solid #fff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        #score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 100px;
            font-size: 3em;
            font-weight: bold;
            color: rgba(255,255,255,0.5);
        }
        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        #controls {
            margin-top: 20px;
            text-align: center;
            color: #aaa;
        }
        .key {
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 5px;
            color: #fff;
            font-family: monospace;
        }
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }
        #game-over-screen { display: none; }
        .screen-title {
            color: #fff;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255,255,255,0.8);
        }
        .mode-select {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .mode-btn {
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mode-btn:hover, .mode-btn.active {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>PONG</h1>
    </div>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div id="score-display">
            <span id="player-score">0</span>
            <span id="ai-score">0</span>
        </div>
        
        <div id="start-screen">
            <div class="screen-title">PONG</div>
            <div class="mode-select">
                <button class="mode-btn active" onclick="setMode('easy')">Easy</button>
                <button class="mode-btn" onclick="setMode('medium')">Medium</button>
                <button class="mode-btn" onclick="setMode('hard')">Hard</button>
            </div>
            <button class="btn" onclick="startGame()">START GAME</button>
        </div>
        
        <div id="game-over-screen">
            <div class="screen-title" id="winner-text">YOU WIN!</div>
            <button class="btn" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>
    
    <div id="controls">
        <p><span class="key">↑</span> <span class="key">↓</span> or <span class="key">W</span> <span class="key">S</span> to move paddle</p>
        <p>First to 10 points wins!</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game objects
        const paddleWidth = 15;
        const paddleHeight = 100;
        const ballSize = 15;
        
        let player = { x: 30, y: canvas.height/2 - paddleHeight/2, score: 0 };
        let ai = { x: canvas.width - 45, y: canvas.height/2 - paddleHeight/2, score: 0 };
        let ball = { x: canvas.width/2, y: canvas.height/2, dx: 5, dy: 5 };
        
        let gameRunning = false;
        let gameMode = 'easy';
        let aiSpeed = 4;
        
        const AI_SPEEDS = { easy: 3, medium: 5, hard: 7 };
        
        function setMode(mode) {
            gameMode = mode;
            aiSpeed = AI_SPEEDS[mode];
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * (5 + Math.random() * 2);
            ball.dy = (Math.random() * 2 - 1) * 5;
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw center line
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width/2, 0);
            ctx.lineTo(canvas.width/2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Draw paddles
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#fff';
            ctx.fillRect(player.x, player.y, paddleWidth, paddleHeight);
            ctx.fillRect(ai.x, ai.y, paddleWidth, paddleHeight);
            
            // Draw ball
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ballSize/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function update() {
            if (!gameRunning) return;
            
            // Move ball
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            // Ball collision with top/bottom
            if (ball.y - ballSize/2 <= 0 || ball.y + ballSize/2 >= canvas.height) {
                ball.dy = -ball.dy;
            }
            
            // Ball collision with player paddle
            if (ball.x - ballSize/2 <= player.x + paddleWidth &&
                ball.y >= player.y &&
                ball.y <= player.y + paddleHeight &&
                ball.dx < 0) {
                ball.dx = -ball.dx * 1.05;
                let relativeIntersectY = (player.y + paddleHeight/2) - ball.y;
                let normalizedIntersectY = relativeIntersectY / (paddleHeight/2);
                ball.dy = -normalizedIntersectY * 8;
            }
            
            // Ball collision with AI paddle
            if (ball.x + ballSize/2 >= ai.x &&
                ball.y >= ai.y &&
                ball.y <= ai.y + paddleHeight &&
                ball.dx > 0) {
                ball.dx = -ball.dx * 1.05;
                let relativeIntersectY = (ai.y + paddleHeight/2) - ball.y;
                let normalizedIntersectY = relativeIntersectY / (paddleHeight/2);
                ball.dy = -normalizedIntersectY * 8;
            }
            
            // Score
            if (ball.x < 0) {
                ai.score++;
                updateScore();
                checkWin();
                resetBall();
            } else if (ball.x > canvas.width) {
                player.score++;
                updateScore();
                checkWin();
                resetBall();
            }
            
            // AI movement
            let aiCenter = ai.y + paddleHeight/2;
            if (aiCenter < ball.y - 35) {
                ai.y += aiSpeed;
            } else if (aiCenter > ball.y + 35) {
                ai.y -= aiSpeed;
            }
            
            // Keep paddles in bounds
            player.y = Math.max(0, Math.min(canvas.height - paddleHeight, player.y));
            ai.y = Math.max(0, Math.min(canvas.height - paddleHeight, ai.y));
        }
        
        function updateScore() {
            document.getElementById('player-score').textContent = player.score;
            document.getElementById('ai-score').textContent = ai.score;
        }
        
        function checkWin() {
            if (player.score >= 10 || ai.score >= 10) {
                gameRunning = false;
                const winnerText = document.getElementById('winner-text');
                winnerText.textContent = player.score >= 10 ? 'YOU WIN!' : 'AI WINS!';
                winnerText.style.color = player.score >= 10 ? '#7fff00' : '#ff0066';
                document.getElementById('game-over-screen').style.display = 'flex';
            }
        }
        
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            player.score = 0;
            ai.score = 0;
            updateScore();
            resetBall();
            gameRunning = true;
            gameLoop();
        }
        
        function resetGame() {
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    player.y -= 15;
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    player.y += 15;
                    break;
            }
        });
        
        // Initial draw
        draw();
    </script>
</body>
</html>
